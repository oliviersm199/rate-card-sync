name: Validate rate card spec

on:
    pull_request:
        paths:
            - "**.yaml"
            - "**.yml"

jobs:
    test:
        uses: ./.github/workflows/ci.yml

    validate:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - run: npm ci

            - name: Dry-run sync
              env:
                  METRONOME_BEARER_TOKEN: ${{ secrets.METRONOME_BEARER_TOKEN }}
              run: npx rate-card sync examples/rate-card.yaml --dry-run --exit-code
