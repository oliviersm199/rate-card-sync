name: Sync rate card

on:
    push:
        branches:
            - main
        paths:
            - "examples/rate-card.yaml"

jobs:
    test:
        uses: ./.github/workflows/ci.yml

    sync:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - run: npm ci

            - name: Apply rate card changes
              env:
                  METRONOME_BEARER_TOKEN: ${{ secrets.METRONOME_BEARER_TOKEN }}
              run: npx rate-card sync examples/rate-card.yaml
