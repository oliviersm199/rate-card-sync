name: CI

on:
    push:
        branches:
            - main
    pull_request:
    workflow_call:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - run: npm ci

            - run: npm run format:check

            - run: npm run typecheck

            - run: npm run coverage

            - run: npm run build
